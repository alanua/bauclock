
services:
  postgres:
    image: postgres:15-alpine
    container_name: bauclock-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bauclock-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: bauclock-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: bauclock-caddy
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: ./bot/Dockerfile
    container_name: bauclock-bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BOT_ROLE: dedicated_client
    restart: unless-stopped

  bot-platform:
    build:
      context: .
      dockerfile: ./bot/Dockerfile
    container_name: bauclock-bot-platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BOT_TOKEN: ${PLATFORM_BOT_TOKEN}
      BOT_USERNAME: ${PLATFORM_BOT_USERNAME}
      BOT_ROLE: platform
      ADMIN_USERNAMES: "[]"
    restart: unless-stopped

  bot-shared:
    build:
      context: .
      dockerfile: ./bot/Dockerfile
    container_name: bauclock-bot-shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BOT_TOKEN: ${SHARED_CLIENT_BOT_TOKEN}
      BOT_USERNAME: ${SHARED_CLIENT_BOT_USERNAME}
      BOT_ROLE: shared_client
      ADMIN_USERNAMES: "[]"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
